name: release

on:
  push:
    branches: [main]
  # Dispatched by release-automerge.yml after it merges the release PR: a
  # GITHUB_TOKEN push does not trigger workflows, but workflow_dispatch is the
  # documented exception, so this is what actually cuts the release.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp

  # Gated on the same workflow run rather than the tag-push event: a tag created
  # by GITHUB_TOKEN does not trigger downstream workflows, so chaining via job
  # dependency is what builds the binaries without needing a PAT.
  goreleaser:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
