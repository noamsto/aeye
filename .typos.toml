[files]
# Generated SVGs (d2 renders, test fixtures) carry random class ids and hex
# colors that read as typos (e.g. #f38BA8 -> "BA"). They aren't prose.
extend-exclude = ["*.svg"]

[default.extend-words]
# tmux catppuccin option prefix (@thm_mauve, @thm_surface_1, …) — not a typo.
thm = "thm"
# Go standard adjective; both spellings exist but the codebase predates this check.
unparseable = "unparseable"

[default.extend-identifiers]
# AppleScript pasteboard four-char type code for PNG (« class PNGf »); typos
# splits it into PN+Gf and flags PN, so allowlist the whole identifier.
PNGf = "PNGf"
